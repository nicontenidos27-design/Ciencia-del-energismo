<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Desdoblamiento Astral — La Ciencia del Energismo</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --violet:      #9B4FDE;
  --violet-dim:  #6B2FAE;
  --violet-pale: rgba(155,79,222,0.10);
  --bg:          #0A090E;
  --text:        #E8DCC8;
  --muted:       rgba(232,220,200,0.45);
}
html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Cormorant Garamond', Georgia, serif;
  overflow: hidden;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}
#canvas {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
}
.ui {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: space-between;
  padding: 44px 24px 48px;
  pointer-events: none;
}
.top-bar {
  display: flex; align-items: center;
  justify-content: space-between;
  width: 100%; max-width: 460px;
}
.back-btn {
  pointer-events: all;
  background: none;
  border: 1px solid rgba(155,79,222,0.3);
  color: var(--muted);
  font-family: 'Cinzel', serif;
  font-size: 10px; letter-spacing: 0.2em;
  padding: 7px 14px; border-radius: 2px;
  cursor: pointer; transition: all 0.2s;
}
.back-btn:hover { border-color: var(--violet); color: var(--violet); }
.page-title {
  font-family: 'Cinzel', serif;
  font-size: 10px; letter-spacing: 0.28em;
  color: var(--muted); text-transform: uppercase;
  text-align: center;
}
.page-subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic; font-size: 11px;
  color: rgba(155,79,222,0.6);
  letter-spacing: 0.1em; text-align: center;
  margin-top: 3px;
}
.counter-box {
  display: flex; flex-direction: column;
  align-items: flex-end; gap: 2px;
}
.counter-num {
  font-family: 'Cinzel', serif;
  font-size: 22px; color: var(--violet); line-height: 1;
}
.counter-label {
  font-family: 'Cinzel', serif;
  font-size: 8px; letter-spacing: 0.2em;
  color: var(--muted); text-transform: uppercase;
}

/* mantra display */
.mantra-display {
  display: flex; flex-direction: column;
  align-items: center; gap: 14px;
}
.mantra-word {
  font-family: 'Cinzel', serif;
  font-size: clamp(42px, 13vw, 80px);
  letter-spacing: 0.3em;
  color: var(--violet);
  opacity: 0;
  transform: scale(0.88);
  transition: opacity 0.4s, transform 0.4s;
  line-height: 1;
  text-shadow: 0 0 50px rgba(155,79,222,0.5);
}
.mantra-word.show {
  opacity: 1; transform: scale(1);
}
.phase-label {
  font-family: 'Cinzel', serif;
  font-size: 10px; letter-spacing: 0.3em;
  color: var(--muted); text-transform: uppercase;
  min-height: 16px; text-align: center;
}

/* bottom */
.bottom-ui {
  display: flex; flex-direction: column;
  align-items: center; gap: 20px;
  width: 100%;
}
.controls {
  display: flex; gap: 16px; align-items: center;
  pointer-events: all;
}
.ctrl-btn {
  background: none;
  border: 1px solid rgba(155,79,222,0.4);
  color: var(--violet);
  font-family: 'Cinzel', serif;
  font-size: 11px; letter-spacing: 0.22em;
  padding: 13px 32px; border-radius: 2px;
  cursor: pointer; transition: all 0.22s;
  text-transform: uppercase;
}
.ctrl-btn:hover { background: var(--violet-pale); border-color: var(--violet); }
.ctrl-btn:active { transform: scale(0.97); }
.ctrl-btn.secondary {
  border-color: rgba(155,79,222,0.2);
  color: var(--muted); font-size: 10px;
  padding: 10px 22px;
}
.ctrl-btn.secondary:hover { border-color: rgba(155,79,222,0.5); color: var(--violet); }

.hint-text {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic; font-size: 13px;
  color: var(--muted); text-align: center;
  max-width: 300px; line-height: 1.6;
}

/* sound btn */
.sound-btn {
  pointer-events: all;
  background: none; border: none;
  color: var(--muted); font-size: 18px;
  cursor: pointer; padding: 4px;
  transition: color 0.2s;
}
.sound-btn:hover { color: var(--violet); }
</style>
</head>

qqqqqqqqqqqqqqqpMQU1FMy4xMDCqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqv/7EGTdj/AAAGkAAAAIAAANIAAAAQAAAaQAAAAgAAA0gAAABKqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq//sQZN2P8AAAaQAAAAgAAA0gAAABAAABpAAAACAAADSAAAAEqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqr/+xBk3Y/wAABpAAAACAAADSAAAAEAAAGkAAAAIAAANIAAAASqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqv/7EGTdj/AAAGkAAAAIAAANIAAAAQAAAaQAAAAgAAA0gAAABKqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq//sQZN2P8AAAaQAAAAgAAA0gAAABAAABpAAAACAAADSAAAAEqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqr/+xBk3Y/wAABpAAAACAAADSAAAAEAAAGkAAAAIAAANIAAAASqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqv/7EGTdj/AAAGkAAAAIAAANIAAAAQAAAaQAAAAgAAA0gAAABKqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq" type="audio/mpeg"/>

<div class="ui">
  <!-- TOP -->
  <div class="top-bar">
    <button class="back-btn" onclick="history.back()">← Volver</button>
    <div>
      <div class="page-title">Desdoblamiento Astral</div>
      <div class="page-subtitle">Mantra LA — RA</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
      <div class="counter-box">
        <div class="counter-num" id="loopNum">0</div>
        <div class="counter-label">Ciclos</div>
      </div>
      <button class="sound-btn" id="soundBtn" onclick="toggleSound()">🔊</button>
    </div>
  </div>

  <!-- CENTER -->
  <div class="mantra-display">
    <div class="mantra-word" id="mantraWord">LA — RA</div>
    <div class="phase-label" id="phaseLabel">Relajá el cuerpo · Expandí la conciencia</div>
  </div>

  <!-- BOTTOM -->
  <div class="bottom-ui">
    <div class="hint-text" id="hintText">Cerrá los ojos · Seguí el mantra · Soltá el cuerpo</div>
    <div class="controls">
      <button class="ctrl-btn secondary" id="resetBtn" onclick="resetPractice()" style="display:none;">Reiniciar</button>
      <button class="ctrl-btn" id="mainBtn" onclick="togglePractice()">Comenzar</button>
      <button class="ctrl-btn secondary" id="stopBtn" onclick="stopPractice()" style="display:none;">Detener</button>
    </div>
  </div>
</div>

<script>
const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d');
const audio   = document.getElementById('mantraAudio');

let W, H, cx, cy;
let running   = false;
let soundOn   = true;
let loops     = 0;
let energy    = 0;
let sphereR   = 0;
let targetR   = 0;
let particles = [];
let lastTs    = 0;
let t         = 0;
let pulse     = 0; // 0..1 breathing pulse

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W/2; cy = H/2;
}
window.addEventListener('resize', resize);
resize();

// Track loops via audio ended — but audio is looping, use timeupdate
audio.addEventListener('timeupdate', () => {
  // count each loop completion
});
let lastTime = 0;
audio.addEventListener('timeupdate', () => {
  if (audio.currentTime < lastTime && running) {
    loops++;
    document.getElementById('loopNum').textContent = loops;
    energy = Math.min(1, energy + 0.06);
    spawnBurst(20, 3);
  }
  lastTime = audio.currentTime;
});

// ── Controls ──
function togglePractice() {
  if (!running) startPractice();
  else pausePractice();
}

function startPractice() {
  running = true;
  document.getElementById('mainBtn').textContent = 'Pausar';
  document.getElementById('stopBtn').style.display = 'inline-block';
  document.getElementById('resetBtn').style.display = 'none';
  document.getElementById('mantraWord').classList.add('show');
  document.getElementById('phaseLabel').textContent = 'Relajá el cuerpo · Expandí la conciencia';
  document.getElementById('hintText').textContent = 'Cerrá los ojos · Seguí el mantra · Soltá el cuerpo';
  if (soundOn) audio.play().catch(()=>{});
}

function pausePractice() {
  running = false;
  document.getElementById('mainBtn').textContent = 'Continuar';
  document.getElementById('phaseLabel').textContent = 'En pausa';
  audio.pause();
}

function stopPractice() {
  running = false;
  audio.pause();
  audio.currentTime = 0;
  document.getElementById('mainBtn').textContent = 'Comenzar';
  document.getElementById('stopBtn').style.display = 'none';
  document.getElementById('resetBtn').style.display = 'inline-block';
  document.getElementById('mantraWord').classList.remove('show');
  document.getElementById('phaseLabel').textContent = 'Relajá el cuerpo · Expandí la conciencia';
}

function resetPractice() {
  loops = 0; energy = 0;
  document.getElementById('loopNum').textContent = '0';
  document.getElementById('resetBtn').style.display = 'none';
  document.getElementById('mantraWord').classList.remove('show');
  document.getElementById('mainBtn').textContent = 'Comenzar';
  document.getElementById('phaseLabel').textContent = 'Relajá el cuerpo · Expandí la conciencia';
  particles = [];
}

function toggleSound() {
  soundOn = !soundOn;
  document.getElementById('soundBtn').textContent = soundOn ? '🔊' : '🔇';
  if (!soundOn) audio.pause();
  else if (running) audio.play().catch(()=>{});
}

// ── Particles ──
function spawnBurst(count, speed) {
  for (let i=0; i<count; i++) {
    const a = Math.random()*Math.PI*2;
    const s = speed*(0.5+Math.random());
    particles.push({
      x:cx, y:cy,
      vx:Math.cos(a)*s, vy:Math.sin(a)*s,
      life:1, decay:0.012+Math.random()*0.015,
      size:1.5+Math.random()*3
    });
  }
}
function spawnOrbit() {
  const a = Math.random()*Math.PI*2;
  const r = sphereR*(1+Math.random()*0.6);
  particles.push({
    x:cx+Math.cos(a)*r, y:cy+Math.sin(a)*r,
    orbit:true, angle:a, radius:r,
    speed:(0.003+Math.random()*0.005)*(Math.random()>0.5?1:-1),
    life:1, decay:0.004+Math.random()*0.005,
    size:1+Math.random()*2
  });
}

// ── Draw ──
function draw(ts) {
  requestAnimationFrame(draw);
  const dt = Math.min((ts-lastTs)/1000, 0.05);
  lastTs = ts; t += dt;

  const base = Math.min(W,H)*0.20;

  // slow breathing pulse always running
  pulse = Math.sin(t * 0.45) * 0.5 + 0.5;

  if (running) {
    targetR = base*(0.75 + pulse*0.55 + energy*0.35);
    if (Math.random()<0.18) spawnOrbit();
  } else {
    targetR = base*(0.65 + pulse*0.18);
    if (Math.random()<0.03) spawnOrbit();
  }

  sphereR += (targetR-sphereR)*dt*3.5;

  // ── Clear ──
  ctx.clearRect(0,0,W,H);

  // bg glow — violet
  const bg = ctx.createRadialGradient(cx,cy,0,cx,cy,Math.min(W,H)*0.65);
  bg.addColorStop(0, `rgba(100,40,180,${0.05+energy*0.10+(running?pulse*0.05:0)})`);
  bg.addColorStop(1,'transparent');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  // outer rings
  for (let r=0;r<4;r++) {
    const rr=sphereR*(1.5+r*0.55);
    const al=(0.08-r*0.018)*(0.3+energy*0.7);
    const off=Math.sin(t*(0.25+r*0.08)+r*2)*6;
    ctx.beginPath(); ctx.arc(cx,cy,rr+off,0,Math.PI*2);
    ctx.strokeStyle=`rgba(155,79,222,${al})`; ctx.lineWidth=1; ctx.stroke();
  }

  // outer glow
  const og=ctx.createRadialGradient(cx,cy,sphereR*0.3,cx,cy,sphereR*2.2);
  og.addColorStop(0,`rgba(155,79,222,${0.18+energy*0.22+(running?pulse*0.08:0)})`);
  og.addColorStop(1,'transparent');
  ctx.beginPath(); ctx.arc(cx,cy,sphereR*2.2,0,Math.PI*2);
  ctx.fillStyle=og; ctx.fill();

  // core sphere — violet gradient
  const cg=ctx.createRadialGradient(cx-sphereR*0.25,cy-sphereR*0.25,0,cx,cy,sphereR);
  const ca=0.55+energy*0.3+(running?pulse*0.1:0);
  cg.addColorStop(0,  `rgba(220,180,255,${ca})`);
  cg.addColorStop(0.3,`rgba(155,79,222,${ca*0.9})`);
  cg.addColorStop(0.65,`rgba(90,30,160,${ca*0.65})`);
  cg.addColorStop(1,  `rgba(30,10,60,${ca*0.2})`);
  ctx.beginPath(); ctx.arc(cx,cy,sphereR,0,Math.PI*2);
  ctx.fillStyle=cg; ctx.fill();

  // shimmer
  const sh=ctx.createRadialGradient(cx-sphereR*0.3,cy-sphereR*0.3,0,cx-sphereR*0.3,cy-sphereR*0.3,sphereR*0.6);
  sh.addColorStop(0,`rgba(240,220,255,${0.2+Math.sin(t*1.8)*0.08})`);
  sh.addColorStop(1,'transparent');
  ctx.beginPath(); ctx.arc(cx,cy,sphereR,0,Math.PI*2);
  ctx.fillStyle=sh; ctx.fill();

  // edge
  ctx.beginPath(); ctx.arc(cx,cy,sphereR,0,Math.PI*2);
  ctx.strokeStyle=`rgba(200,160,255,${0.35+energy*0.3})`; ctx.lineWidth=1.5; ctx.stroke();

  // particles
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    p.life-=p.decay;
    if(p.orbit){
      p.angle+=p.speed; p.radius+=0.15;
      p.x=cx+Math.cos(p.angle)*p.radius;
      p.y=cy+Math.sin(p.angle)*p.radius;
    }else{
      p.x+=p.vx; p.y+=p.vy;
      p.vx*=0.97; p.vy*=0.97;
    }
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
    ctx.fillStyle=`rgba(180,120,255,${p.life*0.8})`;
    ctx.fill();
  });

  // stars — distant astral effect
  if (running) {
    for (let s=0; s<3; s++) {
      const sx = (Math.sin(t*0.07+s*2.1)*0.4+0.5)*W;
      const sy = (Math.cos(t*0.05+s*1.7)*0.4+0.5)*H;
      const sa = (Math.sin(t*0.8+s)*0.5+0.5)*0.15*energy;
      ctx.beginPath(); ctx.arc(sx,sy,1.2,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,160,255,${sa})`; ctx.fill();
    }
  }
}

requestAnimationFrame(draw);
</script>
